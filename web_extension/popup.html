<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Malicious URL Detection</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div id="app">
      <div id="header">
        <div id="header-left">
          <img src="images/icon-48.png" alt="" />
          <div id="header-text">
            <span id="app-name">Malicious URL Detection</span>
            <span id="app-subtitle">V1.1.0 · PROTECTED</span>
          </div>
        </div>
      </div>

      <div id="settings">
        <div class="setting-row">
          <div class="setting-label">
            Warning Threshold
            <span
              title="The danger score over which a site is flagged as suspicious">
              <svg
                title="The danger score over which a site is flagged as suspicious"
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-circle-alert-icon lucide-circle-alert">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" x2="12" y1="8" y2="12" />
                <line x1="12" x2="12.01" y1="16" y2="16" />
              </svg>
            </span>
          </div>
          <div class="setting-control">
            <button class="btn-threshold" id="warning-dec">−</button>
            <span class="setting-value" id="warning-value">45%</span>
            <button class="btn-threshold" id="warning-inc">+</button>
          </div>
        </div>
        <div class="setting-row">
          <div class="setting-label">
            Danger Threshold
            <span
              title="The danger score over which a site is flagged as danger">
              <svg
                title="The danger score over which a site is flagged as suspicious"
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-circle-alert-icon lucide-circle-alert">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" x2="12" y1="8" y2="12" />
                <line x1="12" x2="12.01" y1="16" y2="16" />
              </svg>
            </span>
          </div>
          <div class="setting-control">
            <button class="btn-threshold" id="danger-dec">−</button>
            <span class="setting-value" id="danger-value">75%</span>
            <button class="btn-threshold" id="danger-inc">+</button>
          </div>
        </div>
      </div>

      <div id="stats">
        <div class="stat-card">
          <span class="stat-label">Scanned</span>
          <span class="stat-value" id="stat-scanned">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label threat">Threats</span>
          <span class="stat-value threat" id="stat-flagged">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Whitelisted</span>
          <span class="stat-value" id="stat-whitelisted">0</span>
        </div>
      </div>

      <div id="whitelist-section">
        <div id="whitelist-header">
          <span id="whitelist-title">Whitelisted Domains</span>
        </div>
        <div id="whitelist-container">
          <div id="whitelist-empty">No trusted sites yet.</div>
          <ul id="whitelist-list"></ul>
        </div>
      </div>

      <div id="footer">
        <button id="btn-clear-all">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4h6v2" />
          </svg>
          Clear All Domains
        </button>
      </div>
    </div>
    <script src="scripts/popup.js" type="module"></script>
  </body>
</html>
