<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Malicious URL Detection</title>
    <link rel="stylesheet" href="styles/popup.css" />
  </head>
  <body>
    <div id="app">
      <div id="header">
        <div id="header-left">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-shield-alert-icon lucide-shield-alert">
            <path
              d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
          </svg>
          <div id="header-text">
            <span id="app-name">Malicious URL Detection</span>
            <span id="app-subtitle">V1.0.0 · PROTECTED</span>
          </div>
        </div>
      </div>

      <div id="stats">
        <div class="stat-card">
          <span class="stat-label">Scanned</span>
          <span class="stat-value" id="stat-scanned">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label threat">Threats</span>
          <span class="stat-value threat" id="stat-flagged">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Whitelist</span>
          <span class="stat-value" id="stat-whitelisted">0</span>
        </div>
      </div>

      <div id="whitelist-section">
        <div id="whitelist-header">
          <span id="whitelist-title">Whitelisted Domains</span>
        </div>
        <div id="whitelist-container">
          <div id="whitelist-empty">No trusted sites yet.</div>
          <ul id="whitelist-list"></ul>
        </div>
      </div>

      <div id="footer">
        <button id="btn-clear-all">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4h6v2" />
          </svg>
          Clear All Domains
        </button>
      </div>
    </div>
    <script src="scripts/popup.js" type="module"></script>
  </body>
</html>
